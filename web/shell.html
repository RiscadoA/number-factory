<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#281e28">
    <title>Number Factory</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        background: #281e28;
        color: #fff5eb;
      }

      * { box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: #201920;
      }

      .page {
        display: grid;
        grid-template-rows: 32px minmax(0, 1fr);
        gap: 6px;
        width: 100%;
        height: 100dvh;
        padding: 6px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      h1 {
        margin: 0;
        color: #d8c5cd;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: .12em;
        white-space: nowrap;
      }

      button {
        flex: none;
        border: 1px solid #6f5965;
        border-radius: 2px;
        padding: 6px 9px;
        background: transparent;
        color: #d8c5cd;
        font: 600 10px/1 inherit;
        cursor: pointer;
      }

      button:hover { border-color: #d8c5cd; color: #fff5eb; }
      button:active { background: #332832; }

      #stage {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid #4b3a45;
        border-radius: 2px;
        background: #140f14;
      }

      #canvas {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        outline: 0;
        background: #dcc0ca;
        image-rendering: pixelated;
        touch-action: none;
      }

      #loading {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        gap: 14px;
        padding: 24px;
        background: #281e28ee;
        text-align: center;
        transition: opacity .2s ease;
      }

      #loading.done { opacity: 0; pointer-events: none; }

      #status {
        min-height: 1.2em;
        color: #fff5eb;
        font-size: 13px;
      }

      progress {
        width: min(320px, 70vw);
        height: 12px;
        border: 0;
        border-radius: 999px;
        overflow: hidden;
        background: #140f14;
      }

      progress::-webkit-progress-bar { background: #140f14; }
      progress::-webkit-progress-value { background: #ffdc64; }
      progress::-moz-progress-bar { background: #ffdc64; }

      .error { color: #ff7979 !important; }

      @media (max-height: 420px) {
        .page { grid-template-rows: 26px minmax(0, 1fr); padding: 3px; gap: 3px; }
        button { padding: 4px 7px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1>NUMBER FACTORY</h1>
        <button id="fullscreen" type="button">FULLSCREEN</button>
      </header>

      <section id="stage">
        <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
        <div id="loading" role="status" aria-live="polite">
          <div id="status">Downloading...</div>
          <progress id="progress" value="0" max="100"></progress>
        </div>
      </section>

    </main>

    <script>
      const canvas = document.getElementById("canvas");
      const stage = document.getElementById("stage");
      const loading = document.getElementById("loading");
      const statusElement = document.getElementById("status");
      const progressElement = document.getElementById("progress");
      let resizeQueued = false;
      let runtimeReady = false;

      function notifySDLOfResize() {
        if (!runtimeReady || resizeQueued) return;
        resizeQueued = true;
        requestAnimationFrame(() => {
          resizeQueued = false;
          window.dispatchEvent(new Event("resize"));
        });
      }

      var Module = {
        canvas,
        print: (...args) => console.log(...args),
        printErr: (...args) => console.error(...args),
        setStatus(text) {
          statusElement.textContent = text;
          if (!text) loading.classList.add("done");
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          if (left) {
            const complete = this.totalDependencies - left;
            progressElement.value = complete;
            progressElement.max = this.totalDependencies;
            this.setStatus(`Preparing... ${complete}/${this.totalDependencies}`);
          } else {
            progressElement.value = progressElement.max;
            this.setStatus("");
          }
        },
        onRuntimeInitialized() {
          canvas.focus();
        },
        postRun: [() => {
          runtimeReady = true;
          notifySDLOfResize();
        }]
      };

      new ResizeObserver(notifySDLOfResize).observe(stage);
      document.addEventListener("fullscreenchange", notifySDLOfResize);
      document.getElementById("fullscreen").addEventListener("click", async () => {
        try {
          if (!document.fullscreenElement) await stage.requestFullscreen();
          else await document.exitFullscreen();
        } catch (error) {
          console.error(error);
        }
      });
      window.addEventListener("error", () => {
        statusElement.textContent = "The game could not start. Check the browser console.";
        statusElement.classList.add("error");
        loading.classList.remove("done");
      });

      Module.setStatus("Downloading...");
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
